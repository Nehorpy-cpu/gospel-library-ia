apiVersion: v1
kind: ConfigMap
metadata:
  name: gospel-config
data:
  ENV: production
  LOG_LEVEL: INFO
  NEXT_PUBLIC_APP_URL: https://www.estudiopy.com
  NEXT_PUBLIC_API_URL: https://api.estudiopy.com
  NEXT_PUBLIC_ENVIRONMENT: production
  SCRAPER_INTERNAL_URL: http://scraper-api:8080
  QDRANT_URL: http://qdrant:6333
  QDRANT_COLLECTION: doctrinal_chunks_v1
  OPENAI_EMBEDDING_MODEL: text-embedding-3-large
  OPENAI_EMBEDDING_DIMENSIONS: "3072"
  OPENAI_CHAT_MODEL: gpt-5.5
  CHUNK_TARGET_TOKENS: "650"
  RETRIEVAL_FINAL_LIMIT: "12"
