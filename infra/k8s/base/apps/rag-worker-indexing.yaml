apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-worker-indexing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-worker-indexing
  template:
    metadata:
      labels:
        app: rag-worker-indexing
    spec:
      containers:
        - name: rag-worker-indexing
          image: ghcr.io/OWNER/gospel-library-rag:latest
          command: ["celery", "-A", "app.workers.celery_app", "worker", "-Q", "rag-indexing", "--loglevel=info", "--concurrency=2"]
          envFrom:
            - configMapRef:
                name: gospel-config
            - secretRef:
                name: gospel-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-worker-indexing
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-worker-indexing
  minReplicas: 1
  maxReplicas: 30
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
