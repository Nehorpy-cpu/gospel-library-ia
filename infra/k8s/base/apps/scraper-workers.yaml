apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraper-worker-scraping
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scraper-worker-scraping
  template:
    metadata:
      labels:
        app: scraper-worker-scraping
    spec:
      containers:
        - name: worker
          image: ghcr.io/OWNER/gospel-library-scraper:production
          command: ["celery", "-A", "app.workers.celery_app", "worker", "-Q", "scraping", "--loglevel=info", "--concurrency=4"]
          envFrom:
            - configMapRef:
                name: gospel-config
            - secretRef:
                name: gospel-secrets
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 3Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraper-worker-assets
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scraper-worker-assets
  template:
    metadata:
      labels:
        app: scraper-worker-assets
    spec:
      containers:
        - name: worker
          image: ghcr.io/OWNER/gospel-library-scraper:production
          command: ["celery", "-A", "app.workers.celery_app", "worker", "-Q", "assets", "--loglevel=info", "--concurrency=4"]
          envFrom:
            - configMapRef:
                name: gospel-config
            - secretRef:
                name: gospel-secrets
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraper-worker-ocr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scraper-worker-ocr
  template:
    metadata:
      labels:
        app: scraper-worker-ocr
    spec:
      containers:
        - name: worker
          image: ghcr.io/OWNER/gospel-library-scraper:production
          command: ["celery", "-A", "app.workers.celery_app", "worker", "-Q", "ocr", "--loglevel=info", "--concurrency=2"]
          envFrom:
            - configMapRef:
                name: gospel-config
            - secretRef:
                name: gospel-secrets
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 6Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraper-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: scraper-scheduler
  template:
    metadata:
      labels:
        app: scraper-scheduler
    spec:
      containers:
        - name: scheduler
          image: ghcr.io/OWNER/gospel-library-scraper:production
          command: ["celery", "-A", "app.workers.celery_app", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: gospel-config
            - secretRef:
                name: gospel-secrets
