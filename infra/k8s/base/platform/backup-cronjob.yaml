apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
spec:
  schedule: "15 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              envFrom:
                - secretRef:
                    name: gospel-secrets
              env:
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: gospel-secrets
                      key: R2_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: gospel-secrets
                      key: R2_SECRET_ACCESS_KEY
              command:
                - /bin/sh
                - -c
                - |
                  apk add --no-cache aws-cli
                  TS=$(date -u +%Y%m%dT%H%M%SZ)
                  pg_dump "$DATABASE_URL" --format=custom --no-owner --no-acl > /tmp/gospel-$TS.dump
                  aws s3 cp /tmp/gospel-$TS.dump s3://$R2_BUCKET/backups/postgres/gospel-$TS.dump --endpoint-url "$R2_ENDPOINT_URL"
