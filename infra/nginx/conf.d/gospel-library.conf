upstream web_upstream {
  server web:3000;
  keepalive 32;
}

upstream rag_upstream {
  server rag-api:8090;
  keepalive 32;
}

upstream scraper_upstream {
  server scraper-api:8080;
  keepalive 16;
}

server {
  listen 80;
  server_name _;

  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "0" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:; connect-src 'self' http: https:; frame-ancestors 'self';" always;

  limit_conn addr 40;

  location / {
    proxy_pass http://web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
  }

  location /api/rag/chat/stream {
    limit_req zone=chat_rate burst=4 nodelay;
    proxy_pass http://rag_upstream/chat/stream;
    proxy_http_version 1.1;
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
  }

  location /api/rag/ {
    limit_req zone=api_rate burst=20 nodelay;
    proxy_pass http://rag_upstream/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
  }

  location /api/scraper/ {
    limit_req zone=api_rate burst=10 nodelay;
    proxy_pass http://scraper_upstream/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Request-ID $request_id;
  }
}
