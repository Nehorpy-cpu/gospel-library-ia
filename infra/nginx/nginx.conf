user nginx;
worker_processes auto;

events {
  worker_connections 4096;
  multi_accept on;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format json_combined escape=json
    '{"time":"$time_iso8601","remote_addr":"$remote_addr","request":"$request",'
    '"status":$status,"body_bytes_sent":$body_bytes_sent,"request_time":$request_time,'
    '"upstream_response_time":"$upstream_response_time","http_referrer":"$http_referer",'
    '"http_user_agent":"$http_user_agent","request_id":"$request_id"}';

  access_log /var/log/nginx/access.log json_combined;
  error_log /var/log/nginx/error.log warn;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;
  client_max_body_size 64m;

  gzip on;
  gzip_comp_level 5;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

  limit_req_zone $binary_remote_addr zone=api_rate:10m rate=8r/s;
  limit_req_zone $binary_remote_addr zone=chat_rate:10m rate=2r/s;
  limit_conn_zone $binary_remote_addr zone=addr:10m;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  include /etc/nginx/conf.d/*.conf;
}
