global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: rag-api
    metrics_path: /metrics
    static_configs:
      - targets: ["rag-api:8090"]

  - job_name: scraper-api
    metrics_path: /metrics
    static_configs:
      - targets: ["scraper-api:8080"]

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets: ["qdrant:6333"]
